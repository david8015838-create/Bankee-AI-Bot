<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOP 理解驗證中心</title>
  <script src="https://accounts.google.com/gsi/client" async></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; height: 100vh; overflow: hidden;
      background: #f0f2f5; color: #1a1a2e;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 260px; min-width: 260px;
      background: #1a2332; color: #fff;
      display: flex; flex-direction: column;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 20px 16px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
    .sidebar-logo .icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, #f7954f, #fc5c7c);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center; font-size: 18px;
    }
    .sidebar-logo h1 { font-size: 15px; font-weight: 700; }
    .sidebar-logo p { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 1px; text-transform: uppercase; }

    .sidebar-section { padding: 12px 16px 8px; }
    .sidebar-section-title {
      font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px;
    }

    .sop-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; margin-bottom: 4px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px; cursor: pointer;
      transition: all 0.15s;
    }
    .sop-item:hover { background: rgba(247,149,79,0.15); border-color: rgba(247,149,79,0.3); }
    .sop-item.active { background: rgba(247,149,79,0.2); border-color: rgba(247,149,79,0.5); }
    .sop-item-name { font-size: 12px; color: rgba(255,255,255,0.85); flex: 1; line-height: 1.4; }
    .badge {
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      font-weight: 600; white-space: nowrap; margin-left: 6px; flex-shrink: 0;
    }
    .badge-pending { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .badge-analyzing { background: rgba(251,191,36,0.2); color: #fbbf24; }
    .badge-verified { background: rgba(34,197,94,0.2); color: #22c55e; }
    .badge-issues { background: rgba(239,68,68,0.2); color: #ef4444; }

    .sidebar-stats {
      margin: 0 16px 12px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px; padding: 12px;
    }
    .stats-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .stats-label { font-size: 11px; color: rgba(255,255,255,0.4); }
    .stats-bar { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .stats-bar-fill { height: 100%; background: linear-gradient(90deg, #f7954f, #fc5c7c); border-radius: 3px; transition: width 0.4s; }

    .sidebar-actions { padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.08); margin-top: auto; }
    .btn-secondary {
      width: 100%; padding: 8px; border: 1px solid rgba(255,255,255,0.15);
      background: transparent; color: rgba(255,255,255,0.6); border-radius: 8px;
      font-size: 12px; cursor: pointer; transition: all 0.15s; margin-bottom: 6px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); color: #fff; }
    .nav-link {
      display: block; text-align: center; font-size: 11px;
      color: rgba(255,255,255,0.35); text-decoration: none;
      padding: 4px; transition: color 0.15s;
    }
    .nav-link:hover { color: rgba(255,255,255,0.6); }

    /* ── Main ── */
    .main {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: #f0f2f5;
    }
    .main-header {
      background: #fff; border-bottom: 1px solid #e5e7eb;
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .main-header h2 { font-size: 18px; font-weight: 700; color: #111827; }
    .main-header p { font-size: 13px; color: #6b7280; margin-top: 2px; }
    .btn-analyze {
      padding: 10px 20px;
      background: linear-gradient(135deg, #f7954f, #fc5c7c);
      color: #fff; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .btn-analyze:hover { opacity: 0.9; }
    .btn-analyze:disabled { opacity: 0.5; cursor: not-allowed; }

    .main-content { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* ── Empty state ── */
    .empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; color: #9ca3af; text-align: center;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 18px; color: #374151; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── Review Cards ── */
    .review-section { margin-bottom: 16px; }
    .review-section-title {
      font-size: 11px; font-weight: 700; color: #6b7280;
      letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px;
    }

    .review-card {
      background: #fff; border-radius: 12px;
      border: 1px solid #e5e7eb; overflow: hidden; margin-bottom: 10px;
    }
    .review-card-header {
      padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid #f3f4f6;
    }
    .review-card-label {
      font-size: 12px; font-weight: 600; color: #374151;
      display: flex; align-items: center; gap: 6px;
    }
    .review-card-label .field-icon { font-size: 14px; }
    .review-card-body { padding: 14px 16px; }
    .ai-text {
      font-size: 13.5px; color: #1f2937; line-height: 1.7;
      background: #f9fafb; border-radius: 8px; padding: 12px;
      border-left: 3px solid #e5e7eb;
    }
    .ai-text.ok { border-left-color: #22c55e; }
    .ai-text.wrong { border-left-color: #ef4444; }

    .review-actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-ok {
      padding: 7px 16px; border: 1.5px solid #22c55e;
      background: transparent; color: #22c55e; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn-ok:hover, .btn-ok.active { background: #22c55e; color: #fff; }
    .btn-wrong {
      padding: 7px 16px; border: 1.5px solid #ef4444;
      background: transparent; color: #ef4444; border-radius: 8px;
      font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .btn-wrong:hover, .btn-wrong.active { background: #ef4444; color: #fff; }

    .correction-area {
      margin-top: 10px; display: none;
    }
    .correction-area.show { display: block; }
    .correction-area label { font-size: 11px; font-weight: 600; color: #6b7280; margin-bottom: 4px; display: block; }
    .correction-area textarea {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid #fbbf24; border-radius: 8px;
      font-size: 13px; line-height: 1.6; resize: vertical;
      font-family: inherit; background: #fffbeb; color: #1f2937;
      min-height: 80px;
    }
    .correction-area textarea:focus { outline: none; border-color: #f59e0b; }

    /* Steps */
    .step-card {
      background: #fff; border-radius: 12px; border: 1px solid #e5e7eb;
      margin-bottom: 10px; overflow: hidden;
    }
    .step-card-header {
      padding: 12px 16px; display: flex; align-items: center;
      justify-content: space-between; cursor: pointer;
      background: #f9fafb;
    }
    .step-card-header:hover { background: #f3f4f6; }
    .step-number {
      width: 24px; height: 24px; border-radius: 50%;
      background: linear-gradient(135deg, #f7954f, #fc5c7c);
      color: #fff; font-size: 11px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .step-title { font-size: 13px; font-weight: 600; color: #1f2937; margin-left: 10px; flex: 1; }
    .step-body { padding: 14px 16px; border-top: 1px solid #f3f4f6; display: none; }
    .step-body.open { display: block; }
    .step-field { margin-bottom: 10px; }
    .step-field-label { font-size: 11px; font-weight: 600; color: #9ca3af; margin-bottom: 4px; }
    .step-field-value { font-size: 13px; color: #374151; line-height: 1.6; }
    .step-field-value.highlight { color: #dc2626; font-weight: 500; }

    /* List items */
    .ai-list { list-style: none; }
    .ai-list li {
      font-size: 13.5px; color: #1f2937; line-height: 1.7;
      padding: 6px 12px; background: #f9fafb; border-radius: 6px;
      border-left: 3px solid #e5e7eb; margin-bottom: 6px;
    }
    .ai-list li.ok { border-left-color: #22c55e; }
    .ai-list li.wrong { border-left-color: #ef4444; }

    /* Analyzing overlay */
    .analyzing-overlay {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px;
      color: #6b7280; text-align: center;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid #f3f4f6;
      border-top-color: #f7954f; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Save button area */
    .save-bar {
      background: #fff; border-top: 1px solid #e5e7eb;
      padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    }
    .save-bar-info { font-size: 13px; color: #6b7280; }
    .btn-save {
      padding: 10px 24px;
      background: linear-gradient(135deg, #4f8ef7, #7c5cfc);
      color: #fff; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-save:hover { opacity: 0.9; }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Export modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-overlay.active { display: flex; }
    .modal-box {
      background: #fff; border-radius: 16px; width: 680px; max-width: 95vw;
      max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .modal-header {
      padding: 20px 24px 16px; border-bottom: 1px solid #e5e7eb;
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 16px; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #9ca3af; }
    .modal-body { padding: 20px 24px; flex: 1; overflow-y: auto; }
    .modal-body p { font-size: 13px; color: #6b7280; margin-bottom: 12px; line-height: 1.6; }
    .modal-body textarea {
      width: 100%; height: 300px; padding: 12px; font-size: 12px;
      font-family: 'Courier New', monospace; line-height: 1.5;
      border: 1.5px solid #e5e7eb; border-radius: 8px; resize: none;
      background: #f9fafb; color: #1f2937;
    }
    .modal-footer { padding: 16px 24px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 8px; }
    .btn-copy {
      padding: 10px 20px; background: #1f2937; color: #fff;
      border: none; border-radius: 8px; font-size: 13px; cursor: pointer; transition: opacity 0.15s;
    }
    .btn-copy:hover { opacity: 0.85; }

    /* Toast */
    .toast {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: #fff; padding: 10px 20px; border-radius: 10px;
      font-size: 13px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .toast.show { opacity: 1; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <div class="icon">🔍</div>
      <div>
        <h1>驗證中心</h1>
        <p>SOP Understanding Check</p>
      </div>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">驗證進度</div>
    <div class="sidebar-stats">
      <div class="stats-row">
        <span class="stats-label">已驗證</span>
        <span class="stats-label" id="statsText">0 / 0</span>
      </div>
      <div class="stats-bar">
        <div class="stats-bar-fill" id="statsBar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-section-title">SOP 文件</div>
    <div id="sopList">
      <div style="font-size:12px;color:rgba(255,255,255,0.35);padding:8px 0;">載入中...</div>
    </div>
  </div>

  <div class="sidebar-actions">
    <button class="btn-secondary" onclick="openExportModal()">📋 匯出驗證摘要</button>
    <button class="btn-secondary" onclick="clearAllVerification()">🗑 清除所有驗證</button>
    <a href="index.html" class="nav-link">← 回到 SOP 助理</a>
  </div>
</div>

<!-- Main -->
<div class="main">
  <div class="main-header">
    <div>
      <h2 id="headerTitle">選擇一份 SOP 開始驗證</h2>
      <p id="headerSub">確認 AI 的理解是否與人類一致</p>
    </div>
    <button class="btn-analyze" id="analyzeBtn" onclick="startAnalysis()" disabled>🔬 開始分析</button>
  </div>

  <div class="main-content" id="mainContent">
    <div class="empty-state">
      <div class="icon">🧐</div>
      <h3>尚未選擇文件</h3>
      <p>從左側選擇一份 SOP，<br>讓 AI 告訴你它的理解，<br>再由你判斷對不對。</p>
    </div>
  </div>

  <div class="save-bar" id="saveBar" style="display:none">
    <div class="save-bar-info" id="saveBarInfo">完成審核後儲存結果</div>
    <button class="btn-save" id="saveBtn" onclick="saveVerification()">💾 儲存驗證結果</button>
  </div>
</div>

<!-- Export Modal -->
<div class="modal-overlay" id="exportModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>📋 驗證摘要 — 複製到 index.html</h3>
      <button class="modal-close" onclick="closeExportModal()">✕</button>
    </div>
    <div class="modal-body">
      <p>將以下文字加入 <code>index.html</code> 的 system prompt 中，讓 AI 回答時參考已驗證的正確理解：</p>
      <textarea id="exportText" readonly></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-copy" onclick="copyExport()">複製全部</button>
      <button class="btn-secondary" style="border-color:rgba(0,0,0,0.15);color:#6b7280" onclick="closeExportModal()">關閉</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ═══════════════════════════════════════
  // CONSTANTS (同 index.html)
  // ═══════════════════════════════════════
  const DRIVE_API_KEY = 'AIzaSyCL2ntyvU8nZSQN6DnCOvXfLeaqwIFyCj4';
  const FOLDER_ID = '1C4Eg8j2uqomZL9bpKaAGDHJsa-tRJg0D';
  const DEFAULT_OAUTH_CLIENT_ID = '996786285425-h6vlgr1n072s8ltee70oopus3qjh3h74.apps.googleusercontent.com';
  const MODELS = {
    gemini: ['gemini-2.0-flash', 'gemini-1.5-pro', 'gemini-1.5-flash'],
    openai: ['gpt-4o', 'gpt-4-turbo', 'gpt-3.5-turbo']
  };
  const VERIFICATION_KEY = 'bankee_verification_v2';
  const FILE_CACHE_KEY = 'sop_file_cache_v1';
  const FILE_CACHE_TTL = 30 * 60 * 1000;

  let sopFiles = [];
  let selectedFileId = null;
  let currentExtraction = null; // AI 抽取的結構
  let reviewState = {};         // { fieldKey: { status, correction } }

  // ═══════════════════════════════════════
  // SETTINGS (共用 index.html 的 localStorage)
  // ═══════════════════════════════════════
  function getApiKeys() {
    try { return JSON.parse(localStorage.getItem('api_keys_v2') || '[]'); } catch(e) { return []; }
  }
  function getSettings() {
    return {
      provider: localStorage.getItem('ai_provider') || 'gemini',
      model: localStorage.getItem('ai_model') || 'gemini-2.0-flash'
    };
  }
  function getOAuthClientId() { return localStorage.getItem('oauth_client_id') || DEFAULT_OAUTH_CLIENT_ID; }

  // ═══════════════════════════════════════
  // OAUTH + DRIVE (同 index.html)
  // ═══════════════════════════════════════
  let gDriveToken = null, gTokenExpiry = 0, gTokenClient = null;

  function initGisClient() {
    if (!window.google?.accounts?.oauth2) throw new Error('Google 驗證程式庫尚未載入');
    if (gTokenClient) return;
    gTokenClient = google.accounts.oauth2.initTokenClient({
      client_id: getOAuthClientId(),
      scope: 'https://www.googleapis.com/auth/drive',
      callback: () => {}
    });
  }

  function requestGoogleAuth() {
    return new Promise((resolve, reject) => {
      try { initGisClient(); } catch(e) { reject(e); return; }
      if (!gDriveToken) {
        const saved = localStorage.getItem('gauth_token');
        const expiry = parseInt(localStorage.getItem('gauth_expiry') || '0', 10);
        if (saved && Date.now() < expiry - 60000) { gDriveToken = saved; gTokenExpiry = expiry; }
      }
      if (gDriveToken && Date.now() < gTokenExpiry - 60000) { resolve(gDriveToken); return; }
      gTokenClient.callback = (resp) => {
        if (resp.error) { reject(new Error(resp.error_description || resp.error)); return; }
        gDriveToken = resp.access_token;
        gTokenExpiry = Date.now() + (resp.expires_in || 3600) * 1000;
        localStorage.setItem('gauth_token', gDriveToken);
        localStorage.setItem('gauth_expiry', String(gTokenExpiry));
        resolve(gDriveToken);
      };
      gTokenClient.requestAccessToken({ prompt: '' });
    });
  }

  function googleDocHtmlToText(html) {
    const doc = new DOMParser().parseFromString(html, 'text/html');
    doc.querySelectorAll('a[href]').forEach(a => {
      let href = a.getAttribute('href') || '';
      const m = href.match(/[?&]q=([^&]+)/);
      if (m) href = decodeURIComponent(m[1]);
      a.replaceWith(`[${a.textContent}](${href})`);
    });
    return doc.body?.innerText || '';
  }

  async function loadSOPs() {
    try {
      const listRes = await fetch(
        `https://www.googleapis.com/drive/v3/files?q=%27${FOLDER_ID}%27+in+parents+and+trashed=false&fields=files(id,name,mimeType,webViewLink)&key=${DRIVE_API_KEY}`
      );
      if (!listRes.ok) throw new Error('無法存取 Google Drive');
      const { files = [] } = await listRes.json();
      if (!files.length) { renderSopList(); return; }

      function readFileCache() { try { return JSON.parse(localStorage.getItem(FILE_CACHE_KEY) || '{}'); } catch(e) { return {}; } }
      function writeFileCache(c) { try { localStorage.setItem(FILE_CACHE_KEY, JSON.stringify(c)); } catch(e) {} }
      const fileCache = readFileCache();
      sopFiles = [];

      const needDownload = files.filter(f => {
        const c = fileCache[f.id];
        return !c || Date.now() - c.ts > FILE_CACHE_TTL;
      });

      if (needDownload.length > 0) {
        try { await requestGoogleAuth(); } catch(e) {
          files.forEach(f => {
            const c = fileCache[f.id];
            sopFiles.push({ id: f.id, name: f.name, mimeType: f.mimeType, webViewLink: f.webViewLink, content: c ? c.content : '' });
          });
          renderSopList();
          return;
        }
      }

      await Promise.all(files.map(async f => {
        const c = fileCache[f.id];
        if (c && Date.now() - c.ts <= FILE_CACHE_TTL) {
          sopFiles.push({ id: f.id, name: f.name, mimeType: f.mimeType, webViewLink: f.webViewLink, content: c.content });
          return;
        }
        try {
          let content = '';
          if (f.mimeType === 'application/vnd.google-apps.document') {
            const r = await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}/export?mimeType=text%2Fhtml`, { headers: { 'Authorization': `Bearer ${gDriveToken}` } });
            content = googleDocHtmlToText(await r.text());
          } else {
            const r = await fetch(`https://www.googleapis.com/drive/v3/files/${f.id}?alt=media`, { headers: { 'Authorization': `Bearer ${gDriveToken}` } });
            content = await r.text();
          }
          fileCache[f.id] = { content, ts: Date.now() };
          sopFiles.push({ id: f.id, name: f.name, mimeType: f.mimeType, webViewLink: f.webViewLink, content });
        } catch(e) {
          const cached = fileCache[f.id];
          sopFiles.push({ id: f.id, name: f.name, mimeType: f.mimeType, webViewLink: f.webViewLink, content: cached?.content || '' });
        }
      }));
      writeFileCache(fileCache);
      renderSopList();
    } catch(e) {
      document.getElementById('sopList').innerHTML = `<div style="font-size:12px;color:#ef4444;padding:8px 0">${e.message}</div>`;
    }
  }

  // ═══════════════════════════════════════
  // VERIFICATION STORAGE
  // ═══════════════════════════════════════
  function loadAllVerifications() {
    try { return JSON.parse(localStorage.getItem(VERIFICATION_KEY) || '{}'); } catch(e) { return {}; }
  }
  function saveAllVerifications(data) {
    localStorage.setItem(VERIFICATION_KEY, JSON.stringify(data));
  }
  function getVerificationStatus(fileId) {
    const all = loadAllVerifications();
    return all[fileId]?.overallStatus || 'pending';
  }

  // ═══════════════════════════════════════
  // SIDEBAR RENDER
  // ═══════════════════════════════════════
  function renderSopList() {
    const container = document.getElementById('sopList');
    if (!sopFiles.length) { container.innerHTML = '<div style="font-size:12px;color:rgba(255,255,255,0.35);padding:8px 0">找不到文件</div>'; return; }

    container.innerHTML = sopFiles.map((f, i) => {
      const status = getVerificationStatus(f.id);
      const badgeMap = { pending: ['badge-pending', '未驗證'], analyzing: ['badge-analyzing', '分析中'], verified: ['badge-verified', '已驗證'], issues: ['badge-issues', '有問題'] };
      const [cls, label] = badgeMap[status] || badgeMap.pending;
      return `<div class="sop-item" id="item-${f.id}" onclick="selectSop('${f.id}')">
        <span class="sop-item-name">${f.name}</span>
        <span class="badge ${cls}" id="badge-${f.id}">${label}</span>
      </div>`;
    }).join('');

    updateStats();
  }

  function updateStats() {
    const all = loadAllVerifications();
    const total = sopFiles.length;
    const verified = sopFiles.filter(f => all[f.id]?.overallStatus === 'verified').length;
    document.getElementById('statsText').textContent = `${verified} / ${total}`;
    document.getElementById('statsBar').style.width = total ? `${(verified/total)*100}%` : '0%';
  }

  function updateBadge(fileId, status) {
    const badgeMap = { pending: ['badge-pending', '未驗證'], analyzing: ['badge-analyzing', '分析中'], verified: ['badge-verified', '已驗證'], issues: ['badge-issues', '有問題'] };
    const [cls, label] = badgeMap[status] || badgeMap.pending;
    const el = document.getElementById(`badge-${fileId}`);
    if (el) { el.className = `badge ${cls}`; el.textContent = label; }
    updateStats();
  }

  // ═══════════════════════════════════════
  // SELECT SOP
  // ═══════════════════════════════════════
  function selectSop(fileId) {
    selectedFileId = fileId;
    document.querySelectorAll('.sop-item').forEach(el => el.classList.remove('active'));
    const item = document.getElementById(`item-${fileId}`);
    if (item) item.classList.add('active');

    const file = sopFiles.find(f => f.id === fileId);
    if (!file) return;

    document.getElementById('headerTitle').textContent = file.name;
    document.getElementById('analyzeBtn').disabled = false;

    // Check if already verified
    const all = loadAllVerifications();
    const existing = all[fileId];
    if (existing && existing.extraction) {
      currentExtraction = existing.extraction;
      reviewState = existing.reviews || {};
      document.getElementById('headerSub').textContent = `上次驗證：${existing.verifiedAt || '未知'} · 點擊「開始分析」重新分析`;
      renderReviewPanel(file);
    } else {
      currentExtraction = null;
      reviewState = {};
      document.getElementById('headerSub').textContent = '點擊「開始分析」讓 AI 說明它的理解';
      document.getElementById('mainContent').innerHTML = `
        <div class="empty-state">
          <div class="icon">🔬</div>
          <h3>${file.name}</h3>
          <p>點擊右上角「開始分析」<br>讓 AI 用自己的話描述它對這份 SOP 的理解，<br>再由你逐條確認對不對。</p>
        </div>`;
      document.getElementById('saveBar').style.display = 'none';
    }
  }

  // ═══════════════════════════════════════
  // AI CALL
  // ═══════════════════════════════════════
  async function callAI(systemPrompt, userMessage) {
    const keys = getApiKeys();
    if (!keys.length) throw new Error('請先在 index.html 的設定中加入 API Key');
    const { provider, model } = getSettings();
    const allModels = MODELS[provider] || [model];

    for (let ki = 0; ki < keys.length; ki++) {
      for (let mi = 0; mi < allModels.length; mi++) {
        try {
          const apiKey = keys[ki];
          const currentModel = mi === 0 ? model : allModels[mi];
          if (provider === 'gemini') {
            const body = {
              systemInstruction: { parts: [{ text: systemPrompt }] },
              contents: [{ role: 'user', parts: [{ text: userMessage }] }],
              generationConfig: { temperature: 0.1, maxOutputTokens: 4096 }
            };
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${currentModel}:generateContent?key=${apiKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
            });
            if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'Gemini error'); }
            const data = await res.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
          } else {
            const messages = [{ role: 'system', content: systemPrompt }, { role: 'user', content: userMessage }];
            const res = await fetch('https://api.openai.com/v1/chat/completions', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
              body: JSON.stringify({ model: currentModel, messages, temperature: 0.1, max_tokens: 4096 })
            });
            if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'OpenAI error'); }
            const data = await res.json();
            return data.choices?.[0]?.message?.content || '';
          }
        } catch(e) {
          const retryable = e.message.includes('429') || e.message.includes('503') || e.message.includes('quota') || e.message.includes('overloaded');
          if (!retryable) throw e;
        }
      }
    }
    throw new Error('所有 API Key 都失敗了，請稍後再試');
  }

  // ═══════════════════════════════════════
  // START ANALYSIS
  // ═══════════════════════════════════════
  async function startAnalysis() {
    const file = sopFiles.find(f => f.id === selectedFileId);
    if (!file) return;

    document.getElementById('analyzeBtn').disabled = true;
    document.getElementById('saveBar').style.display = 'none';
    updateBadge(file.id, 'analyzing');

    document.getElementById('mainContent').innerHTML = `
      <div class="analyzing-overlay">
        <div class="spinner"></div>
        <div style="font-size:15px;font-weight:600;color:#374151;margin-bottom:8px">AI 正在理解這份 SOP…</div>
        <div style="font-size:13px;color:#9ca3af">讓 AI 用自己的話重新描述，不是複製原文</div>
      </div>`;

    const systemPrompt = `你是一個 SOP 理解驗證系統。你的任務是讀取一份 SOP 文件，然後用「你自己的話」重新解釋你對這份 SOP 的理解。
重要：不要直接複製原文句子，用你自己的理解重新描述。
你必須只輸出合法的 JSON，不要有任何其他文字、markdown 格式或解釋。`;

    const userMessage = `請讀取以下 SOP 文件，然後輸出你的理解（JSON 格式）：

---SOP 開始---
${file.content}
---SOP 結束---

請以以下 JSON 格式輸出你的理解（全部用繁體中文，只輸出 JSON，不要有其他文字）：
{
  "summary": "用你自己的話，一句話說明這個 SOP 的目的",
  "actor": "誰需要執行這個流程（可以是多個角色）",
  "trigger": "什麼情況或時機點需要啟動這個流程",
  "prerequisites": ["執行前需要準備或確認的事項1", "事項2"],
  "steps": [
    {
      "name": "步驟名稱（你的理解版本）",
      "actor": "這步驟由誰執行",
      "system": "在哪個系統或地方操作（具體說出系統名稱）",
      "action": "具體要做什麼（用你自己的話描述，不要複製原文）",
      "completion": "怎麼判斷這個步驟完成了",
      "risks": "這個步驟最容易出錯或被忽略的地方"
    }
  ],
  "exceptions": ["可能遇到的異常狀況及你認為正確的處理方式"],
  "keyFacts": ["你認為最關鍵的知識點1（可能是人最容易搞錯的）", "關鍵點2", "關鍵點3"]
}`;

    try {
      const raw = await callAI(systemPrompt, userMessage);
      // Clean up markdown code blocks if present
      let cleaned = raw.trim().replace(/^```json\s*/i, '').replace(/^```\s*/i, '').replace(/```\s*$/, '').trim();
      const extraction = JSON.parse(cleaned);
      currentExtraction = extraction;
      reviewState = {};
      renderReviewPanel(file);
      updateBadge(file.id, 'pending');
    } catch(e) {
      updateBadge(file.id, 'pending');
      document.getElementById('mainContent').innerHTML = `
        <div class="analyzing-overlay">
          <div style="font-size:32px;margin-bottom:12px">⚠️</div>
          <div style="font-size:15px;font-weight:600;color:#dc2626;margin-bottom:8px">分析失敗</div>

        </div>`;
    }
    document.getElementById('analyzeBtn').disabled = false;
  }

  function renderStepCard(step, i) {

    return `<div class="step-card" id="card-${key}">
      <div class="step-card-header" onclick="toggleStep(${i})">

        <div style="font-size:12px;color:${status==='ok'?'#22c55e':status==='wrong'?'#ef4444':'#9ca3af'};margin-left:8px">

        <div style="font-size:14px;color:#9ca3af;margin-left:8px" id="step-arrow-${i}">▼</div>
      </div>

        <div class="review-actions">
          <button class="btn-ok ${status==='ok'?'active':''}" onclick="setFieldStatus('${key}','ok')">✓ 理解正確</button>
          <button class="btn-wrong ${status==='wrong'?'active':''}" onclick="setFieldStatus('${key}','wrong')">✗ 理解有誤</button>

  function toggleStep(i) {
    const body = document.getElementById(`step-body-${i}`);
    const arrow = document.getElementById(`step-arrow-${i}`);
    if (!body) return;
    const isOpen = body.classList.toggle('open');
    if (arrow) arrow.textContent = isOpen ? '▲' : '▼';
  }

  // ═══════════════════════════════════════
  // REVIEW ACTIONS
  // ═══════════════════════════════════════
  function setFieldStatus(key, status) {
    if (!reviewState[key]) reviewState[key] = { status: 'pending', correction: '' };
    reviewState[key].status = status;

    // Update buttons
    const card = document.getElementById(`card-${key}`);
    if (card) {
      card.querySelectorAll('.btn-ok').forEach(b => b.classList.toggle('active', status==='ok'));
      card.querySelectorAll('.btn-wrong').forEach(b => b.classList.toggle('active', status==='wrong'));
      const aiText = card.querySelector('.ai-text');
      if (aiText) { aiText.className = `ai-text ${status==='ok'?'ok':status==='wrong'?'wrong':''}`; }
      const listItems = card.querySelectorAll('.ai-list li');
      listItems.forEach(li => { li.className = status==='ok'?'ok':status==='wrong'?'wrong':''; });
    }
    // Step card: update status text
    if (key.startsWith('step_')) {
      const i = parseInt(key.split('_')[1]);
      const stepBody = document.getElementById(`step-body-${i}`);
      if (stepBody) {
        const actionEl = stepBody.querySelector('.step-field-value');
        if (actionEl) { actionEl.className = `step-field-value ${status==='ok'?'ok':status==='wrong'?'wrong':''}`; }
      }
      const header = document.getElementById(`card-${key}`)?.querySelector('.step-card-header > div:nth-child(3)');
      if (header) {
        header.style.color = status==='ok'?'#22c55e':status==='wrong'?'#ef4444':'#9ca3af';
        header.textContent = status==='ok'?'✓ 正確':status==='wrong'?'✗ 有問題':'未審核';
      }
    }

    // Show/hide correction area
    const correctionEl = document.getElementById(`correction-${key}`);
    if (correctionEl) correctionEl.classList.toggle('show', status==='wrong');

    updateSaveBarInfo();
  }

  function setCorrection(key, value) {
    if (!reviewState[key]) reviewState[key] = { status: 'wrong', correction: '' };
    reviewState[key].correction = value;
  }

  function updateSaveBarInfo() {
    const ex = currentExtraction;
    if (!ex) return;
    const fields = ['summary', 'actor', 'trigger', 'prerequisites', 'keyFacts', 'exceptions'];
    const stepKeys = (ex.steps || []).map((_, i) => `step_${i}`);
    const allKeys = [...fields, ...stepKeys];
    const reviewed = allKeys.filter(k => reviewState[k]?.status && reviewState[k].status !== 'pending').length;
    const wrong = allKeys.filter(k => reviewState[k]?.status === 'wrong').length;
    document.getElementById('saveBarInfo').textContent = `已審核 ${reviewed}/${allKeys.length} 項 · ${wrong > 0 ? `${wrong} 項有問題` : '目前全部正確'}`;
  }

  // ═══════════════════════════════════════
  // SAVE
  // ═══════════════════════════════════════
  function saveVerification() {
    if (!selectedFileId || !currentExtraction) return;
    const all = loadAllVerifications();
    const wrongCount = Object.values(reviewState).filter(r => r.status === 'wrong').length;
    const okCount = Object.values(reviewState).filter(r => r.status === 'ok').length;
    const overallStatus = wrongCount > 0 ? 'issues' : okCount > 0 ? 'verified' : 'pending';
    const file = sopFiles.find(f => f.id === selectedFileId);

    all[selectedFileId] = {
      sopName: file?.name || '',
      verifiedAt: new Date().toISOString().slice(0, 10),
      extraction: currentExtraction,
      reviews: reviewState,
      overallStatus
    };
    saveAllVerifications(all);
    updateBadge(selectedFileId, overallStatus);
    showToast(overallStatus === 'verified' ? '✅ 已儲存，全部通過驗證！' : overallStatus === 'issues' ? '⚠️ 已儲存，部分項目有問題' : '💾 已儲存');
    updateStats();
    if (file) {
      document.getElementById('headerSub').textContent = `驗證完成：${new Date().toLocaleDateString('zh-TW')} · ${wrongCount > 0 ? wrongCount + ' 項有問題' : '全部正確'}`;
    }
  }

  // ═══════════════════════════════════════
  // EXPORT
  // ═══════════════════════════════════════
  function openExportModal() {
    const all = loadAllVerifications();
    const lines = [];
    lines.push('=== 已人工驗證的 AI SOP 理解摘要 ===');
    lines.push('（以下內容已由人工審核確認正確，請優先參考）');
    lines.push('');

    for (const [fileId, data] of Object.entries(all)) {
      if (!data.extraction) continue;
      const ex = data.extraction;
      const rv = data.reviews || {};
      lines.push(`【${data.sopName}】（驗證日期：${data.verifiedAt}，狀態：${data.overallStatus === 'verified' ? '全部通過' : '有部分問題'}）`);
      lines.push(`• 核心目的：${rv.summary?.status==='wrong' && rv.summary?.correction ? rv.summary.correction : ex.summary}`);
      lines.push(`• 執行者：${rv.actor?.status==='wrong' && rv.actor?.correction ? rv.actor.correction : ex.actor}`);
      lines.push(`• 觸發時機：${rv.trigger?.status==='wrong' && rv.trigger?.correction ? rv.trigger.correction : ex.trigger}`);
      if (ex.steps && ex.steps.length) {
        lines.push(`• 步驟摘要：`);
        ex.steps.forEach((step, i) => {
          const key = `step_${i}`;
          const correction = rv[key]?.status==='wrong' && rv[key]?.correction ? `【已修正】${rv[key].correction}` : step.action;
          lines.push(`  ${i+1}. ${step.name}：${correction}`);
        });
      }
      if (ex.keyFacts && ex.keyFacts.length) {
        const corrected = rv.keyFacts?.status==='wrong' && rv.keyFacts?.correction ? rv.keyFacts.correction.split('\n') : ex.keyFacts;
        lines.push(`• 重要注意事項：${corrected.join('；')}`);
      }
      lines.push('');
    }

    if (lines.length <= 3) {
      document.getElementById('exportText').value = '尚未完成任何 SOP 的驗證，請先選擇 SOP 並點擊「開始分析」。';
    } else {
      document.getElementById('exportText').value = lines.join('\n');
    }
    document.getElementById('exportModal').classList.add('active');
  }

  function closeExportModal() { document.getElementById('exportModal').classList.remove('active'); }

  function copyExport() {
    const ta = document.getElementById('exportText');
    ta.select();
    document.execCommand('copy');
    showToast('已複製到剪貼簿！');
  }

  // ═══════════════════════════════════════
  // UTILS
  // ═══════════════════════════════════════
  function clearAllVerification() {
    if (!confirm('確定要清除所有驗證結果嗎？這個動作無法復原。')) return;
    localStorage.removeItem(VERIFICATION_KEY);
    renderSopList();
    if (selectedFileId) selectSop(selectedFileId);
    showToast('已清除所有驗證結果');
  }

  function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ═══════════════════════════════════════
  // INIT
  // ═══════════════════════════════════════
  loadSOPs();
</script>
</body>
</html>
